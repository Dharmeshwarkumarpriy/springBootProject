<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Login here</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
	crossorigin="anonymous">

</head>
<body style="background: #e2e2e2;">
	<div class="container">
		<div class="row mt-5">
			<div class="col md 6 offset md 3">

				<form th:action="@{/process}" method="post" class="bg-white p-4" th:object="${loginData}">

					<h1 class="text-center">Sign up here</h1>

					<div class="form-group">
						<label for="exampleInputEmail1" class="form-label">user
							name </label> <input type="text" name="userName" class="form-control"
							id="exampleInputEmail1" aria-describedby="emailHelp">

<!-- 						th:classappend="${#fields.hasErrors('userName')}?'is-invalid':''" -->

						<!-- 						<div th:each="e:${#fields.errors('userName')}" th:text="${e}" id="validationServer03Feedback" class="invalid-feedback">Please -->
						<!-- 							provide a valid city.</div> -->


						<!-- 											<p th:each="e:${#fields.errors('userName')}" th:text="{e}"></p>							 -->
						<!-- 						<div th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}">error</div> -->

					</div>

					<div class="mb-3">
						<label for="exampleInputPassword1" class="form-label">user
							email</label> <input type="email" name="email" class="form-control"
							id="exampleInputPassword1">
					</div>

					<div class="mb-3 form-check">
						<input type="checkbox" name="agreed" class="form-check-input" id="exampleCheck1">
						<label class="form-check-label" for="exampleCheck1">Agree terms and conditions</label>
					</div>

					<button type="submit" class="btn btn-primary">Submit</button>
				</form>

			</div>
		</div>
	</div>


</body>
</html>
