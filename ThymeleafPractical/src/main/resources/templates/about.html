<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Document</title>
</head>
<body>
	<h1>about learn code with dharam</h1>
	<h1>we are learning spring boot</h1>

	<h1 th:text="${#strings.toUpperCase(name)}"></h1>
	<p>
		length of the name is
		<samp th:text="${#strings.length(name)}"></samp>
	</p>
	<h1 th:text="${currentDate}"></h1>

	<h2>
		name of the owner is: <span th:text="${name}"></span>
	</h2>

	<div th:with="a=5,b=89, n=${name}">
		<h1>
			value of a is <span th:text="${a}"></span>
		</h1>
		<h1 th:text="'value of b is '+${b}"></h1>
		<h1>
			local value of n is <span th:text="${n}"></span>
		</h1>
		<h2 th:text="'sum of '+${a}+ ' and '+${b}+ ' is '+${a+b}"></h2>

	</div>


</body>
</html>
