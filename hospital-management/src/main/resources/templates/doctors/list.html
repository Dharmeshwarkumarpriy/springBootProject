<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctors List</title>
</head>
<body>
<div th:fragment="content" class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Doctors List</h2>
        <a href="/doctors/new" class="btn btn-primary">Add New Doctor</a>
    </div>
    
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Experience</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="doctor : ${doctors}">
                    <td th:text="${doctor.id}"></td>
                    <td th:text="${doctor.name}"></td>
                    <td th:text="${doctor.specialization}"></td>
                    <td th:text="${doctor.experience + ' years'}"></td>
                    <td th:text="${doctor.phone}"></td>
                    <td th:text="${doctor.email}"></td>
                    <td>
                        <a th:href="@{/doctors/edit/{id}(id=${doctor.id})}" 
                           class="btn btn-sm btn-outline-primary">Edit</a>
                        <a th:href="@{/doctors/delete/{id}(id=${doctor.id})}" 
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
