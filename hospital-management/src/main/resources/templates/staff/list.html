<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Hospital Management System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <style>
        :root {
            --primary-color: #0d6efd;
            --sidebar-width: 250px;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fc; }
        .sidebar { background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; }
        .nav-link { color: rgba(255,255,255,0.8) !important; }
        .nav-link:hover, .nav-link.active { color: white !important; }
        .card { box-shadow: 0 0.15rem 1.75rem 0 rgba(33, 40, 50, 0.15); border: none; }
        .btn-primary { background: var(--primary-color); border-color: var(--primary-color); }
        .badge { font-size: 0.75em; }
        .table th { border-top: none; font-weight: 600; }
        @media (max-width: 768px) { .sidebar { margin-left: -250px; } }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="d-flex">
        <div class="sidebar d-flex flex-column p-3 text-white" style="width: var(--sidebar-width);">
            <a class="navbar-brand text-white mb-4" href="/dashboard">
                <i class="fas fa-hospital me-2"></i>HMS
            </a>
            <nav class="nav nav-pills flex-column">
                <a class="nav-link mb-2 active" href="/">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </a>
                <a class="nav-link mb-2" href="/doctors">
                    <i class="fas fa-user-md me-2"></i>Doctors
                </a>
                <a class="nav-link mb-2" href="/patients">
                    <i class="fas fa-user-injured me-2"></i>Patients
                </a>
                <a class="nav-link mb-2" href="/appointments">
                    <i class="fas fa-calendar-check me-2"></i>Appointments
                </a>
                <a class="nav-link mb-2" href="/billings">
                    <i class="fas fa-receipt me-2"></i>Billing
                </a>
                <a class="nav-link mb-2" href="/medicines/new">
                    <i class="fas fa-pills me-2"></i>Medicines
                </a>
                <a class="nav-link mb-2" href="/rooms">
                    <i class="fas fa-bed me-2"></i>Rooms
                </a>
                <a class="nav-link mb-2" href="/staff">
                    <i class="fas fa-users me-2"></i>Staff
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4">
            <!-- Top Navbar -->
            <nav class="navbar navbar-expand navbar-light bg-white shadow-sm mb-4 rounded">
                <div class="container-fluid">
                    <button class="navbar-toggler" type="button">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="navbar-nav ms-auto">
                        <div class="dropdown">
                            <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user-circle fa-2x text-gray-900 me-2"></i>
                                <span>Admin</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Page Content -->
<head>
    <title>Staff Management</title>
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>👷 Staff Management</h2>
        <a href="/staff/new" class="btn btn-success btn-lg">Add Staff</a>
    </div>
<!--     th:replace="~{layout (:: fragment)}" -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-info">
                        <tr>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Department</th>
                            <th>Phone</th>
                            <th>Salary</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${staff}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar bg-info text-white rounded-circle me-2 d-flex align-items-center justify-content-center" 
                                         style="width: 40px; height: 40px;">
                                        <i class="bi bi-person"></i>
                                    </div>
                                    <span th:text="${s.name}"></span>
                                </div>
                            </td>
                            <td><span class="badge bg-primary" th:text="${s.role}"></span></td>
                            <td th:text="${s.department}"></td>
                            <td th:text="${s.phone}"></td>
                            <td class="text-success fw-bold">₹<span th:text="${s.salary}"></span></td>
                            <td>
                                <div class="btn-group">
                                    <a th:href="@{/staff/edit/{id}(id=${s.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                                    <a th:href="@{/staff/delete/{id}(id=${s.id})}" class="btn btn-sm btn-outline-danger">Delete</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body> 
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</body>
</html>
