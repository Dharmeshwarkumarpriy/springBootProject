<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Medicine</title>
</head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header">
                    <h4><i class="bi bi-capsule"></i> Add Medicine</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/medicines}" th:object="${medicine}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Medicine Name</label>
                                <input type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category</label>
                                <input type="text" class="form-control" th:field="*{category}" 
                                       placeholder="Antibiotic, Painkiller, etc.">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Quantity</label>
                                <input type="number" class="form-control" th:field="*{quantity}" min="0">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Price/Unit</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{pricePerUnit}">
                                </div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Expiry Date</label>
                                <input type="date" class="form-control" th:field="*{expiryDate}">
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label">Manufacturer</label>
                                <input type="text" class="form-control" th:field="*{manufacturer}">
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/medicines}" class="btn btn-secondary me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Medicine</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
