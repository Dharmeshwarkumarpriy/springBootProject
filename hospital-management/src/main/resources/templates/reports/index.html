<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reports Dashboard</title>
</head>
<body>
<div th:fragment="content">
    <h2 class="mb-4">📊 Reports Dashboard</h2>
    
    <!-- Report Cards -->
    <div class="row mb-5">
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-primary shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Patients</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${totalPatients}">0</div>
                        </div>
                        <div class="col-auto"><i class="bi bi-people fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-success shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Doctors</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${totalDoctors}">0</div>
                        </div>
                        <div class="col-auto"><i class="bi bi-person-heart fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-info shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-info text-uppercase mb-1">Appointments</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${totalAppointments}">0</div>
                        </div>
                        <div class="col-auto"><i class="bi bi-calendar-check fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-left-warning shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">Revenue</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">₹<span th:text="${totalRevenue}">0</span></div>
                        </div>
                        <div class="col-auto"><i class="bi bi-currency-rupee fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Quick Report Links -->
    <div class="row">
        <div class="col-md-4 mb-4">
            <a href="/reports/daily" class="card h-100 text-decoration-none shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="bi bi-calendar-day display-4 text-primary"></i>
                    <h5 class="mt-3">Daily Report</h5>
                </div>
            </a>
        </div>
        <div class="col-md-4 mb-4">
            <a href="/reports/monthly" class="card h-100 text-decoration-none shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="bi bi-calendar-month display-4 text-success"></i>
                    <h5 class="mt-3">Monthly Report</h5>
                </div>
            </a>
        </div>
        <div class="col-md-4 mb-4">
            <a href="#" class="card h-100 text-decoration-none shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="bi bi-file-earmark-bar-graph display-4 text-info"></i>
                    <h5 class="mt-3">Analytics</h5>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
