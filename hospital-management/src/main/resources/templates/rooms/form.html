<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Room</title>
</head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header">
                    <h4><i class="bi bi-building"></i> Add Room</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/rooms}" th:object="${room}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Room No <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{roomNo}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Room Type</label>
                                <select class="form-select" th:field="*{type}">
                                    <option value="General">General Ward</option>
                                    <option value="Private">Private Room</option>
                                    <option value="ICU">ICU</option>
                                    <option value="HDU">HDU</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Capacity</label>
                                <input type="number" min="1" class="form-control" th:field="*{capacity}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Currently Occupied</label>
                                <input type="number" min="0" class="form-control" th:field="*{occupied}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Price Per Day</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{pricePerDay}">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Status</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="Available">Available</option>
                                    <option value="Occupied">Occupied</option>
                                    <option value="Maintenance">Maintenance</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/rooms}" class="btn btn-secondary me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Room</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
