<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Hospital Management System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        :root {
            --primary-color: #0d6efd;

        .nav-link { color: rgba(255,255,255,0.8) !important; }

        .table th { border-top: none; font-weight: 600; }
        @media (max-width: 768px) { .sidebar { margin-left: -250px; } }
    </style>
</head>

            <nav class="nav nav-pills flex-column">

                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard

                <a class="nav-link mb-2" href="/doctors">
                    <i class="fas fa-user-md me-2"></i>Doctors
                </a>
                <a class="nav-link mb-2" href="/patients">
                    <i class="fas fa-user-injured me-2"></i>Patients
                </a>
                <a class="nav-link mb-2" href="/appointments">
                    <i class="fas fa-calendar-check me-2"></i>Appointments
                </a>
                <a class="nav-link mb-2" href="/billings">
                    <i class="fas fa-receipt me-2"></i>Billing
                </a>
                <a class="nav-link mb-2" href="/medicines/new">
                    <i class="fas fa-pills me-2"></i>Medicines
                </a>
                <a class="nav-link mb-2" href="/rooms">
                    <i class="fas fa-bed me-2"></i>Rooms
                </a>
                <a class="nav-link mb-2" href="/staff">
                    <i class="fas fa-users me-2"></i>Staff
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4">
            <!-- Top Navbar -->
            <nav class="navbar navbar-expand navbar-light bg-white shadow-sm mb-4 rounded">
                <div class="container-fluid">
               <h1 class="display-5 fw-bold mb-1 text-dark">Hospital Management System</h1>
                   
                    <button class="navbar-toggler" type="button">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="navbar-nav ms-auto">
                        <div class="dropdown">
                            <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user-circle fa-2x text-gray-900 me-2"></i>
                                <span>Admin</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Page Content -->
        <div>
        
<head>
    <title>Patients List</title>
</head>
<body>
<div th:fragment="content">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">👥 Patients List</h2>
                <a href="/patients/new" class="btn btn-success btn-lg shadow-sm">
                    <i class="bi bi-plus-circle"></i> Add New Patient
                </a>
            </div>
        </div>
    </div>
    
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Gender</th>
                            <th>Age</th>
                            <th>Phone</th>
                            <th>Disease</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="patient : ${patients}" class="align-middle">
                            <td class="fw-bold" th:text="${patient.id}"></td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-2" 
                                         style="width: 40px; height: 40px;">
                                        <i class="bi bi-person-fill"></i>
                                    </div>
                                    <span th:text="${patient.name}"></span>
                                </div>
                            </td>
                            <td>
                                <span class="badge bg-info" th:text="${patient.gender}"></span>
                            </td>
                            <td th:text="${patient.age}"></td>
                            <td th:text="${patient.phone}"></td>
                            <td>
                                <span class="badge bg-warning text-dark" th:text="${patient.disease}"></span>
                            </td>                          
                         
                            <td>
                               
                                    <a th:href="@{/patients/edit/{id}(id=${patient.id})}" 
                                       class="btn btn-sm btn-outline-primary">Edit 
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/patients/delete/{id}(id=${patient.id})}" 
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Are you sure you want to delete this patient?')">Delete
                                        <i class="bi bi-trash"></i>
                                    </a>
                                
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Empty State -->
    <div th:if="${patients.isEmpty()}" class="text-center py-5">
        <i class="bi bi-people display-1 text-muted"></i>
        <h4 class="mt-3 text-muted">No patients found</h4>
        <a href="/patients/new" class="btn btn-primary">Add First Patient</a>
    </div>
</div>
</body>
        
        </div>
                  
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</body>
</html>
