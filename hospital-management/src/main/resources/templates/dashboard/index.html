<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/layout.html}" rel="stylesheet">
</head>
<body>
<div th:fragment="content">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex align-items-center mb-3">
                <i class="bi bi-speedometer2 display-4 text-primary me-3"></i>
                <div>
                    <h1 class="display-5 fw-bold mb-1 text-dark">Hospital Dashboard</h1>
                    <p class="text-muted mb-0">Welcome back! Here's what's happening today.</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Stats Cards -->
    <div class="row g-4 mb-5">
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-12">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <i class="bi bi-people-fill text-primary fs-1 mb-3"></i>
                    <div class="h4 fw-bold text-dark mb-1" th:text="${totalPatients}">0</div>
                    <div class="text-muted small">Total Patients</div>
                </div>
            </div>
        </div>
        
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-12">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <i class="bi bi-person-heart text-success fs-1 mb-3"></i>
                    <div class="h4 fw-bold text-dark mb-1" th:text="${totalDoctors}">0</div>
                    <div class="text-muted small">Total Doctors</div>
                </div>
            </div>
        </div>
        
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-12">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <i class="bi bi-calendar-check-fill text-info fs-1 mb-3"></i>
                    <div class="h4 fw-bold text-dark mb-1" th:text="${totalAppointments}">0</div>
                    <div class="text-muted small">Appointments</div>
                </div>
            </div>
        </div>
        
        <div class="col-xl-3 col-lg-6 col-md-6 col-sm-12">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <i class="bi bi-currency-rupee text-warning fs-1 mb-3"></i>
                    <div class="h4 fw-bold text-dark mb-1">₹<span th:text="${totalRevenue}">0</span></div>
                    <div class="text-muted small">Total Revenue</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row">
        <!-- Recent Appointments Card -->
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Recent Appointments</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Patient</th>
                                    <th>Doctor</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="appt : ${recentAppointments}">
                                    <td>
                                        <strong th:text="${appt.patient?.name}">N/A</strong>
                                    </td>
                                    <td th:text="${appt.doctor?.name}">N/A</td>
                                    <td th:text="${#temporals.format(appt.appointmentDate, 'MMM dd, hh:mm a')}">N/A</td>
                                    <td>
                                        <span class="badge bg-success" th:text="${appt.status}">Scheduled</span>
                                    </td>
                                </tr>
                                <tr th:if="${recentAppointments == null or recentAppointments.isEmpty()}">
                                    <td colspan="4" class="text-center py-4 text-muted">
                                        <i class="bi bi-calendar-x fs-1 mb-2"></i><br>
                                        No recent appointments
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div class="col-lg-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-success text-white">
                    <h6 class="mb-0"><i class="bi bi-lightning-charge me-2"></i>Quick Actions</h6>
                </div>
                <div class="card-body">
                    <div class="d-grid gap-2">
                        <a href="/patients/new" class="btn btn-outline-primary">
                            <i class="bi bi-person-plus me-2"></i>Add Patient
                        </a>
                        <a href="/doctors/new" class="btn btn-outline-success">
                            <i class="bi bi-person-heart me-2"></i>Add Doctor
                        </a>
                        <a href="/appointments/new" class="btn btn-outline-info">
                            <i class="bi bi-calendar-plus me-2"></i>New Appointment
                        </a>
                        <a href="/billings/new" class="btn btn-outline-warning">
                            <i class="bi bi-receipt me-2"></i>Generate Bill
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
