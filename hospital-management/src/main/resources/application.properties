# MySQL Database Configuration...
spring.datasource.username=root

 spring.datasource.url=jdbc:mysql://localhost:3306/hospitalDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
 spring.datasource.password=root

# railway database connection..
#spring.datasource.url=jdbc:mysql://root:oOWjsoRVGsZoNuRSYZqIfQJKmhTvcGiz@caboose.proxy.rlwy.net:47382/railway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.password=oOWjsoRVGsZoNuRSYZqIfQJKmhTvcGiz

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration...
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration...
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# Logging...
logging.level.com.hospital=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
